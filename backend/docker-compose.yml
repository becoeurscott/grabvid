version: '3.8'

services:
  grabvid-backend:
    build: .
    env_file: .env
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Optional: Add your Proxy URL here to bypass IP bans
      # Example: http://username:password@proxy-server:port
      - PROXY
      # Add your authentication cookies encoded in Base64
      - YOUTUBE_COOKIES_BASE64
      - INSTAGRAM_COOKIES_BASE64
      - TIKTOK_COOKIES_BASE64
      - PINTEREST_COOKIES_BASE64
    volumes:
      - ./logs:/var/log
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
